<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>解答之書 - 終端機版</title>
  <style>
    /* 簡易的終端機科技感樣式 */
    body {
      background-color: #121212;
      color: #00ff66;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .terminal-window {
      width: 600px;
      background-color: #1a1a1a;
      border: 2px solid #333;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
      overflow: hidden;
    }

    .terminal-header {
      background-color: #333;
      padding: 5px 10px;
      color: #fff;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }

    .terminal-body {
      padding: 20px;
      height: 300px;
      overflow-y: auto;
    }

    .output {
      margin-bottom: 15px;
      white-space: pre-line;
    }

    .input-line {
      display: flex;
      align-items: center;
    }

    .prompt {
      color: #00d2ff;
      margin-right: 10px;
    }

    button {
      background-color: #00ff66;
      color: #121212;
      border: none;
      padding: 8px 15px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 10px;
    }

    button:hover {
      background-color: #00cc55;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="terminal-window">
      <div class="terminal-header">
        <span>Terminal - AnswerBook.exe</span>
        <span>● ● ●</span>
      </div>
      <div class="terminal-body">
        <div class="output" id="terminal-output">歡迎來到解答之書終端機。請冥想你的問題，然後點擊下方按鈕獲取宇宙的啟示...</div>
        <div class="input-line">
          <span class="prompt">></span>
          <button id="get-answer-btn">抽取解答</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cmdInput = document.getElementById('cmdInput');
    const outputHistory = document.getElementById('outputHistory');
    const terminalBody = document.getElementById('terminalBody');

    cmdInput.addEventListener('keydown', async function (e) {
      if (e.key === 'Enter') {
        const query = cmdInput.value.trim();
        if (!query) return;

        // 1. 在畫面上秀出使用者輸入的內容
        appendOutput(`\nuser@universe:~$ ${query}`);
        cmdInput.value = ''; // 清空輸入框

        // 2. 判斷終端機指令
        if (query === '/help') {
          appendOutput(`系統指令說明：\n  /random  : 拋棄大腦，直接抽一則宇宙啟示。\n  /history : 查閱過去最近 10 筆問卜紀錄。\n  [隨意輸入] : 輸入你的迷惘，啟動後端資料庫進行命運評判。`);
        } else if (query === '/history') {
          await fetchAndShowHistory();
        } else if (query === '/random') {
          await callBackendAnswer(null); // 不帶問題的隨機抽卡
        } else {
          await callBackendAnswer(query); // 帶有問題的問卜
        }
      }
    });

    function appendOutput(text) {
      outputHistory.textContent += text + '\n';
      terminalBody.scrollTop = terminalBody.scrollHeight; // 自動滾動
    }

    // 向後端請求答案 (支援純隨機與輸入問題)
    async function callBackendAnswer(question) {
      appendOutput(`[系統] 正在呼叫後端核心...`);
      if (question) {
        appendOutput(`[系統] 已檢索備選資料庫，正在委託 AI 針對問題「${question}」進行命運評判...`);
      }

      try {
        // 判斷要用 POST 傳問題，還是用 GET 純隨機抽卡
        const fetchOptions = question
          ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question }) }
          : { method: 'GET' };

        const response = await fetch('/api/get_answer', fetchOptions);
        const data = await response.json();

        if (data.status === 'success') {
          appendOutput(`>> 【宇宙評判解答】：${data.answer}`);
        } else {
          appendOutput(`[錯誤] 宇宙連線失敗：${data.message}`);
        }
      } catch (error) {
        appendOutput(`[錯誤] 無法連接後端伺服器，請檢查 Bun 是否正在運行。`);
      }
    }

    // 抓取並渲染歷史紀錄
    async function fetchAndShowHistory() {
      appendOutput(`[系統] 正在讀取 SQLite 歷史核心紀錄...`);

      try {
        const response = await fetch('/api/get_history');
        const data = await response.json();

        if (data.status === 'success' && data.history.length > 0) {
          appendOutput(`\n時間\t\t\t問題\t\t\t解答`);
          appendOutput(`----------------------------------------------------------------------`);
          data.history.forEach(item => {
            // 格式化輸出在終端機視窗中
            appendOutput(`[${item.time}] Q: ${item.question} -> Ans: ${item.answer}`);
          });
          appendOutput(`----------------------------------------------------------------------`);
        } else if (data.history.length === 0) {
          appendOutput(`>> [提示] 宇宙核心中尚無你的歷史紀錄，快去輸入問題進行第一次問卜吧！`);
        } else {
          appendOutput(`[錯誤] 讀取紀錄失敗：${data.message}`);
        }
      } catch (error) {
        appendOutput(`[錯誤] 無法連接後端讀取紀錄。`);
      }
    }
  </script>
</body>

</html>
