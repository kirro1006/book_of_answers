<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>極客終端機 - AI 解答之書</title>
  <style>
    /* 全域終端機風格設定 */
    body {
      background-color: #0a0a0a;
      color: #00ff33;
      font-family: 'Courier New', Courier, monospace;
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* 終端機主視窗外殼 */
    .terminal-window {
      width: 100%;
      max-width: 800px;
      background-color: #111;
      /*border: 2px solid #00ff33;*/
      box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
      border-radius: 5px;
      overflow: hidden;
    }

    /* 視窗頂部控制列 */
    .terminal-header {
      background-color: #222;
      padding: 10px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    .button-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot-red {
      background-color: #ff5f56;
    }

    .dot-yellow {
      background-color: #ffbd2e;
    }

    .dot-green {
      background-color: #27c93f;
    }

    .window-title {
      margin-left: 20px;
      font-size: 14px;
      color: #888;
    }

    /* 終端機內容輸出區 */
    .terminal-body {
      padding: 20px;
      height: 400px;
      overflow-y: auto;
      font-size: 16px;
      line-height: 1.5;
    }

    /* 功能按鈕區（取代原本死板的純打字） */
    .action-panel {
      margin-top: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .geek-btn {
      background-color: transparent;
      color: #00ff33;
      border: 1px solid #00ff33;
      padding: 10px 20px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .geek-btn:hover {
      background-color: #00ff33;
      color: #0a0a0a;
      box-shadow: 0 0 15px rgba(0, 255, 51, 0.6);
    }

    /* 🔥 動態彈出對話格 (Modal) 樣式 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background-color: #111;
      border: 2px solid #00ff33;
      padding: 30px;
      border-radius: 5px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 25px rgba(0, 255, 51, 0.4);
      text-align: left;
    }

    .modal-box h3 {
      margin-top: 0;
      color: #00ff33;
    }

    .modal-input {
      width: 100%;
      background-color: #000;
      border: 1px solid #00ff33;
      color: #00ff33;
      padding: 10px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      box-sizing: border-box;
      margin-bottom: 20px;
      outline: none;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* 游標閃爍效果 */
    .cursor {
      display: inline-block;
      width: 10px;
      height: 18px;
      background-color: #00ff33;
      animation: blink 0.8s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="terminal-window">
    <div class="terminal-header">
      <div class="buttons">
        <div class="button-dot dot-red"></div>
        <div class="button-dot dot-yellow"></div>
        <div class="button-dot dot-green"></div>
      </div>
      <div class="window-title">universe_terminal.sh</div>
    </div>
    <div class="terminal-body" id="output">
      <div>[System] 系統初始化成功...</div>
      <div>[System] 正在連線至宇宙核心解碼器...</div>
      <div>[System] 請點擊下方指令開始占卜。</div>
      <div>[System] 貼心提醒，問題請以封閉式問題的格式提問<span class="cursor"></span></div>
    </div>
  </div>

  <div class="action-panel">
    <button class="geek-btn" onclick="triggerRandomAnswer()">[ 隨機抽取解答 ]</button>
    <button class="geek-btn" onclick="openQuestionModal()">[ 輸入問題占卜 ]</button>
    <button class="geek-btn" onclick="fetchHistory()">[ 查看歷史紀錄 ]</button>
    <button class="geek-btn" onclick="clearHistoryFromServer()" style="color: #ff5f56; border-color: #ff5f56;">[ 清除歷史紀錄
      ]</button>
  </div>

  <div class="modal-overlay" id="nicknameModal">
    <div class="modal-box">
      <h3>> [SYSTEM AUTHENTICATION] </h3>
      <p style="color: #00ff33; margin-bottom: 15px;">請輸入您的宇宙通行暱稱，以初始化個人命運日誌：</p>
      <input type="text" id="userNicknameInput" class="modal-input" placeholder="例如：計概助教、小明" autocomplete="off">
      <div class="modal-buttons">
        <button class="geek-btn" onclick="submitNickname()">確認連線</button>
      </div>
    </div>
  </div>

  <script>
    // 全域變數與 DOM 節點抓取
      let userNickname = localStorage.getItem('user_nickname');
      const outputDiv = document.getElementById('output');
      const modal = document.getElementById('questionModal');
      const questionInput = document.getElementById('userQuestionInput');

      // 🔥 新增：暱稱彈窗相關節點
        const nicknameModal = document.getElementById('nicknameModal');
        const nicknameInput = document.getElementById('userNicknameInput');

    // 網頁載入時的初始化檢查
      window.addEventListener('DOMContentLoaded', () => {
        // 顯示終端機啟動畫面
        logToTerminal('Initializing Quantum Answer Book Terminal...', 'info');

        // 如果沒有儲存過暱稱，就要求輸入
        if (!userNickname) {
          askForNickname();
        } else {
          logToTerminal(`歡迎回來，【${userNickname}】。宇宙連線已就緒。`, 'success');
        }
      });

      // 🔥 新增：開啟暱稱彈窗
        function openNicknameModal() {
          nicknameModal.classList.add('active');
          nicknameInput.focus();
        }

        // 🔥 新增：監聽暱稱輸入框的 Enter 鍵
        nicknameInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            submitNickname();
          }
        });

        // 🔥 新增：處理暱稱送出與儲存
        function submitNickname() {
          let name = nicknameInput.value.trim();

          // 如果使用者頑皮不輸入，就隨機給他一個酷炫稱號
          if (!name) {
            name = "匿名迷惘者_" + Math.floor(Math.random() * 1000);
          }

          userNickname = name;
          localStorage.setItem('user_nickname', userNickname); // 存入瀏覽器快取

          nicknameModal.classList.remove('active'); // 關閉彈窗
          logToTerminal(`通行證已建立！歡迎你，【${userNickname}】。請開始你的占卜。`, 'success');
        }

      // 要求使用者輸入暱稱的函式
        function askForNickname() {
          let name = prompt("請輸入您的宇宙通行暱稱（作為個人歷史紀錄識別）：");

          // 防止使用者沒輸入或按取消
          if (!name || name.trim() === "") {
            name = "匿名迷惘者_" + Math.floor(Math.random() * 1000);
          }

          userNickname = name.trim();
          localStorage.setItem('user_nickname', userNickname); // 存入瀏覽器快取
          logToTerminal(`通行證已建立！歡迎你，【${userNickname}】。請開始你的占卜。`, 'success');
        }

    // 將訊息輸出到終端機畫面的輔助函式
    function logToTerminal(message, type = 'info') {
      const prefix = type === 'error' ? '[Error] ' : type === 'success' ? '[Success] ' : '> ';
      const div = document.createElement('div');
      div.textContent = prefix + message;
      outputDiv.appendChild(div);
      outputDiv.scrollTop = outputDiv.scrollHeight; // 自動捲動到最底部
    }

    // 開啟彈出填寫格
    function openQuestionModal() {
      modal.classList.add('active');
      questionInput.value = ''; // 清空欄位
      setTimeout(() => questionInput.focus(), 100); // 自動聚焦
    }

    // 關閉彈出填寫格
    function closeQuestionModal() {
      modal.classList.remove('active');
    }

    // 監聽彈出框的 Enter 鍵送出
    questionInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        submitQuestion();
      }
    });

  // ==========================================
  // 修改 A：輸入問題占卜 (完整覆蓋原本的 submitQuestion)
  // ==========================================
  async function submitQuestion() {
    const question = questionInput.value.trim();
    if (!question) {
      alert('請先輸入問題！');
      return;
    }

    closeQuestionModal(); // 關閉對話框
    logToTerminal(`[${userNickname}] 提問: ${question}`); // 調整：顯示是誰提問的

    // 炫技感分析動畫
    logToTerminal('正在分析量子力學機率矩陣...', 'info');
    logToTerminal('正在與天界大數據進行特徵匹配...', 'info');

    try {
      // 🔥【關鍵修改】除了傳 question，網址後面強行串上 &nickname 參數
      const response = await fetch(`/api/get_answer?question=${encodeURIComponent(question)}&nickname=${encodeURIComponent(userNickname)}`);
      const data = await response.json();

      if (data.status === 'success') {
        setTimeout(() => {
          logToTerminal(`宇宙給予【${userNickname}】的啟示: ${data.answer}`, 'success');
        }, 1000);
      } else {
        logToTerminal(`核心解碼失敗: ${data.message}`, 'error');
      }
    } catch (error) {
      logToTerminal('無法連線到預言伺服器。', 'error');
    }
  }

  // ==========================================
  // 附加修改：隨機抽取解答 (帶上暱稱)
  // ==========================================
  async function triggerRandomAnswer() {
    logToTerminal(`觸發【${userNickname}】的隨機解答封包抽取...`);
    try {
      // 🔥【修改重點】不帶 question 沒關係，但記得帶上 nickname 參數
      const response = await fetch(`/api/get_answer?nickname=${encodeURIComponent(userNickname)}`);
      const data = await response.json();
      if (data.status === 'success') {
        logToTerminal(`隨機啟示: ${data.answer}`, 'success');
      } else {
        logToTerminal('抽取失敗。', 'error');
      }
    } catch (error) {
      logToTerminal('連線異常。', 'error');
    }
  }

  // ==========================================
  // 修改 B：查看歷史紀錄 (完整覆蓋原本的 fetchHistory)
  // ==========================================
  async function fetchHistory() {
    logToTerminal(`正在讀取【${userNickname}】的本機 SQLite 個人占卜日誌...`); // 調整：明確告知是個人的
    try {
      // 🔥【關鍵修改】網址後面加上 ?nickname=... 讓後端只撈這個人的紀錄
      const response = await fetch(`/api/get_history?nickname=${encodeURIComponent(userNickname)}`);
      const data = await response.json();

      if (data.status === 'success' && data.history.length > 0) {
        logToTerminal(`--- 歷史紀錄查詢結果 (【${userNickname}】最新10筆) ---`);
        data.history.forEach((item) => {
          // 格式化輸出
          logToTerminal(`[${item.time}] 問: ${item.question || '無'} -> 答: ${item.answer}`);
        });
        logToTerminal('----------------------------------');
      } else {
        logToTerminal(`查無【${userNickname}】的任何占卜紀錄。`, 'info');
      }
    } catch (error) {
      logToTerminal('歷史紀錄讀取失敗。', 'error');
    }
  }

  // ==========================================
  // 修改 C：清除歷史紀錄 (完整覆蓋原本的 clearHistoryFromServer)
  // ==========================================
  async function clearHistoryFromServer() {
    // 調整：提示訊息加入暱稱，防止誤刪別人的
    if (!confirm(`確定要永遠抹除【${userNickname}】在宇宙中所有的占卜歷史紀錄嗎？此操作無法復原。`)) {
      return;
    }

    logToTerminal(`正在對 SQLite 資料庫發送【${userNickname}】的重置訊號...`, 'info');

    try {
      // 🔥【關鍵修改】使用 POST 請求，並在 body 中用 JSON 格式把暱稱包過去
      const response = await fetch('/api/clear_history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname: userNickname }) // 告訴後端只刪這個名字的
      });
      const data = await response.json();

      if (data.status === 'success') {
        logToTerminal(data.message, 'success');
        logToTerminal(`【${userNickname}】的歷史紀錄快取已重置。`, 'info');
      } else {
        logToTerminal(`抹除紀錄失敗：${data.message}`, 'error');
      }
    } catch (error) {
      logToTerminal('無法連線到預言伺服器進行清除動作。', 'error');
    }
  }
  </script>
</body>

</html>
